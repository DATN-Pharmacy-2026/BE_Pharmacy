name: BE CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Basic file check
        run: |
          test -f package.json
          test -f Dockerfile

      - name: Compose syntax check
        run: docker compose -f docker-compose.yml config

      - name: Docker build smoke test (gateway)
        run: docker build --target runtime --build-arg APP_NAME=gateway -t pharmaplus-be-gateway:ci-smoke .

  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - gateway
          - identity-service
          - commerce-service
          - operation-service
          - reporting-setting-service
          - notification-service
          - chatbot-service
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          [ -n "$DOCKERHUB_USERNAME" ] || (echo "Missing secret DOCKERHUB_USERNAME" && exit 1)
          [ -n "$DOCKERHUB_TOKEN" ] || (echo "Missing secret DOCKERHUB_TOKEN" && exit 1)

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/pharmaplus-be-${{ matrix.app }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            APP_NAME=${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
